name: Build, push and deploy

on:
  push:
    tags:
      - '*.*.*-develop'
      - '*.*.*-staging'
      - '*.*.*'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      repository_name: ${{ steps.setup.outputs.repository_name }}
      build_args: ${{ steps.setup.outputs.build_args }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup outputs
        id: setup
        run: |
          {
            echo "repository_name=${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/}"

            echo 'BUILD_ARGS<<EOFenv'
            FLOWEDITOR_VERSION=$(
              jq -r '.dependencies["@nyaruka/flow-editor"]' < package.json
            )
            echo "FLOWEDITOR_VERSION=${FLOWEDITOR_VERSION}"
            echo "FLOWEDITOR_REPO=https://github.com/ilhasoft/floweditor"
            FLOWEDITOR_BRANCH=$(
              jq -r '.weni["floweditor-branch"]' < package.json
            )
            if [[ null == "${FLOWEDITOR_BRANCH}" ]]; then
              FLOWEDITOR_BRANCH="main"
            fi
            echo "FLOWEDITOR_BRANCH=${FLOWEDITOR_BRANCH}"
            echo 'EOFenv'
          } | tee -a "${GITHUB_OUTPUT}"

          {
            echo "### Workflow Outputs"
            echo "| Variable        | Value           |"
            echo "| --------------- | --------------- |"
            echo "| repository_name | Repository name |"
            echo "| build_args      | Build arguments for image |"
          } | tee -a "${GITHUB_STEP_SUMMARY}"

  call-workflow:
    uses: weni-ai/actions-workflows/.github/workflows/reusable-workflow.yaml@main
    needs:
      - setup
    with:
      deploy_type: 'kubernetes'
      dockerfile: 'docker/Dockerfile'
      target_application: "${{ needs.setup.outputs.repository_name }}"
      image_repository: 'push-backend'
      target_repository: 'weni-ai/kubernetes-manifests-platform'
      target_application_directory_prefix: 'weni-flows/'
      target_patch_file: 'deployment-flows-image.json'
      build_args: |
        ${{ needs.setup.outputs.build_args }}
    secrets: inherit

  kong-sync:
    name: Sync Kong allow-list
    runs-on: ubuntu-latest
    needs:
      - call-workflow
    if: contains(github.ref_name, '-staging')
    env:
      python-version: '3.11'
      DJANGO_SETTINGS_MODULE: temba.settings_ci
      KONG_URL_PREFIX: /flows
      KONG_SERVICE: flows-service
      KONG_ADMIN_URL: ${{ secrets.KONG_ADMIN_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux packages
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends libgdal-dev gettext

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.2.0
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.python-version }}-

      - name: Install Python dependencies
        run: |
          poetry add git+https://github.com/noumar/iso639.git
          poetry install --no-interaction

      - name: Initialize environment
        run: |
          ln -s ${{ github.workspace }}/temba/settings.py.dev ${{ github.workspace }}/temba/settings.py

      - name: Discover @kong_expose routes
        run: |
          poetry run python manage.py kong_sync --dry-run

      - name: Update Kong allow-list
        run: |
          poetry run python manage.py kong_sync

